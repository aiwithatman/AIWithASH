<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:#0f0f1a;color:#e0e0e0;min-height:100vh}
.header{background:linear-gradient(135deg,#667eea 0%,#764ba2 100%);padding:60px 20px;text-align:center}
.header h1{font-size:2.5em;margin-bottom:10px;color:#fff}
.header p{font-size:1.1em;color:rgba(255,255,255,0.85);max-width:600px;margin:0 auto}
.container{max-width:1200px;margin:0 auto;padding:40px 20px}
.section-title{font-size:1.8em;margin-bottom:30px;color:#fff;border-left:4px solid #667eea;padding-left:15px}
.products{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:24px}
.card{background:#1a1a2e;border-radius:12px;overflow:hidden;border:1px solid #2a2a4a;transition:transform 0.2s,box-shadow 0.2s}
.card:hover{transform:translateY(-4px);box-shadow:0 8px 25px rgba(102,126,234,0.2)}
.card img{width:100%;height:240px;object-fit:cover;border-bottom:1px solid #2a2a4a}
.card-body{padding:20px}
.card h3{font-size:1.1em;margin-bottom:8px;color:#fff}
.card .desc{font-size:0.9em;color:#a0a0b8;margin-bottom:12px;line-height:1.5}
.card .price{font-size:1.3em;font-weight:700;color:#667eea;margin-bottom:15px}
.card .badge{display:inline-block;background:rgba(102,126,234,0.15);color:#667eea;padding:3px 10px;border-radius:20px;font-size:0.8em;margin-right:5px;margin-bottom:8px}
.buttons{display:flex;gap:10px;flex-wrap:wrap}
.btn{display:inline-flex;align-items:center;justify-content:center;padding:10px 20px;border-radius:8px;text-decoration:none;font-weight:600;font-size:0.9em;transition:opacity 0.2s;flex:1;min-width:120px}
.btn:hover{opacity:0.85}
.btn-gumroad{background:#ff90e8;color:#000}
.btn-upi{background:#00b894;color:#fff}
.footer{text-align:center;padding:30px;color:#666;font-size:0.85em;border-top:1px solid #2a2a4a;margin-top:40px}
@media(max-width:600px){.header h1{font-size:1.8em}.products{grid-template-columns:1fr}}
</style>
</head>
